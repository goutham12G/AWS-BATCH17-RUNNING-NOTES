---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
provisioner: ebs.csi.aws.com  #this informs k8s to use ebs 
parameters:
  type: gp3
  fsType: ext4
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer  ## ensures ebs is created in the same AZ where pod gets created 


---
apiVersion: v1 
kind: PersistentVolumeClaim
metadata:
  name: ebs-dynamic-pvc

spec:
  storageClassName: "ebs-sc" 
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi


   